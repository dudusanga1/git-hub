<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoCode - Boas Vindas</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #7c3aed;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    h1 span {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.1rem;
      color: #9ca3af;
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #7c3aed;
      border-radius: 50%;
      margin: 2rem auto 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">NoCode</div>
    <h1>Boas<br><span>Vindas</span></h1>
    <p>Seja bem-vindo à sua jornada. Aqui você vai construir o futuro sem escrever uma linha de código.</p>
    <div class="dot"></div>
  </div>
</body>
</html>
